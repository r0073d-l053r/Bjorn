<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bjorn Cyberviking - NetKB</title>
    <link rel="icon" href="web/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="web/css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <script src="web/scripts/netkb.js" defer></script>

</head>
<body>
    <div class="toolbar" id="mainToolbar">
        <a href="/index.html" class="logo-link" title="Home">
            <img src="/web/images/bjorn_icon.png" alt="Bjorn">
        </a>
        <button type="button" onclick="window.location.href='/index.html'" title="Playground">
            <img src="/web/images/console_icon.png" alt="Playground">
            <span>Playground</span>
        </button>
        <button type="button" onclick="window.location.href='/config.html'" title="Config">
            <img src="/web/images/config_icon.png" alt="Config">
            <span>Config</span>
        </button>
        <button type="button" onclick="window.location.href='/network.html'" title="Network">
            <img src="/web/images/network_icon.png" alt="Network">
            <span>Network</span>
        </button>
        <button type="button" class="active" onclick="window.location.href='/netkb.html'" title="NetKB">
            <img src="/web/images/netkb_icon.png" alt="NetKB">
            <span>NetKB</span>
        </button>
        <button type="button" onclick="window.location.href='/credentials.html'" title="Credentials">
            <img src="/web/images/cred_icon.png" alt="Credentials">
            <span>Credentials</span>
        </button>
        <button type="button" onclick="window.location.href='/loot.html'" title="Loot">
            <img src="/web/images/loot_icon.png" alt="Loot">
            <span>Loot</span>
        </button>
    </div>
    <div class="console-toolbar">
        <div class="toolbar-left">
            <span style="font-weight: 600; font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;">
                <img src="/web/images/netkb_icon.png" alt="NetKB" style="height: 16px; filter: invert(0.3);">
                Network Knowledge Base
            </span>
        </div>
        <div class="toolbar-right">
            <button type="button" class="toolbar-button" onclick="adjustNetkbFontSize(-1)" title="Decrease Font Size">
                <img src="/web/images/less.png" alt="Icon_less">
            </button>
            <button type="button" class="toolbar-button" onclick="adjustNetkbFontSize(1)" title="Increase Font Size">
                <img src="/web/images/plus.png" alt="Icon_plus">
            </button>
            <button id="toggle-toolbar" type="button" class="toolbar-button" onclick="toggleNetkbToolbar()" data-open="false" title="Hide Navigation">
                <img id="toggle-icon" src="/web/images/hide.png" alt="Toggle Toolbar">
            </button>
        </div>
    </div>
    <div class="netkb-container">
        <div id="netkb-table" class="scrollable-table">
            <!-- The table will be inserted here by JavaScript -->
        </div>
    </div>
</body>
</html>
